<!-- Lucho on fire avatar styles -->
<style>
/* Fire glow on the sidebar avatar */
.author__avatar img {
  transition: all 0.4s ease;
  box-shadow: 0 0 15px rgba(255, 100, 0, 0.4), 0 0 30px rgba(255, 50, 0, 0.2);
  animation: ember-glow 3s ease-in-out infinite;
}

.author__avatar img:hover {
  animation: fire-shake 0.4s ease-in-out infinite, fire-blaze 1.5s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(255, 100, 0, 0.8), 0 0 60px rgba(255, 50, 0, 0.5), 0 0 90px rgba(255, 200, 0, 0.3);
  transform: scale(1.05);
}

@keyframes ember-glow {
  0%, 100% { box-shadow: 0 0 15px rgba(255, 100, 0, 0.4), 0 0 30px rgba(255, 50, 0, 0.2); }
  33% { box-shadow: 0 0 20px rgba(255, 120, 0, 0.5), 0 0 40px rgba(255, 80, 0, 0.3); }
  66% { box-shadow: 0 0 18px rgba(255, 80, 0, 0.45), 0 0 35px rgba(255, 30, 0, 0.25); }
}

@keyframes fire-shake {
  0%, 100% { transform: scale(1.05) rotate(0deg); }
  25% { transform: scale(1.05) rotate(-1deg); }
  75% { transform: scale(1.05) rotate(1deg); }
}

@keyframes fire-blaze {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 100, 0, 0.8), 0 0 60px rgba(255, 50, 0, 0.5), 0 0 90px rgba(255, 200, 0, 0.3); }
  50% { box-shadow: 0 0 50px rgba(255, 100, 0, 1), 0 0 80px rgba(255, 50, 0, 0.7), 0 0 120px rgba(255, 200, 0, 0.4); }
}

/* Fire particle container */
.fire-particle {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  border-radius: 50%;
  animation: particle-rise linear forwards;
}

@keyframes particle-rise {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-100vh) scale(0); }
}

/* Fire rain mode */
.fire-rain-particle {
  position: fixed;
  top: -20px;
  pointer-events: none;
  z-index: 9998;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: fire-rain-fall linear forwards;
}

@keyframes fire-rain-fall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  70% { opacity: 0.8; }
  100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
}
</style>
